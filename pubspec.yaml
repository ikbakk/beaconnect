name: beaconnect
description: "Beaconnect - built for reassurance, not surveillance."
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^16.0.0
  shared_preferences: ^2.5.3
  home_widget: ^0.7.0
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  firebase_crashlytics: ^5.2.4
  cloud_firestore: ^6.0.0
  google_sign_in: ^7.1.1
  permission_handler: ^12.0.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
