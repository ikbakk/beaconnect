<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beaconnect Pairing Companion</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; background: #171817; color: #f4f1e8; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top, #303b35, #171817 58%); }
    main { width: min(92vw, 460px); padding: 28px; box-sizing: border-box; border: 1px solid #4b574d; border-radius: 24px; background: #202520; box-shadow: 0 20px 60px #0008; }
    h1 { margin: 0 0 8px; font-size: 1.55rem; }
    p { color: #c9c9bd; line-height: 1.5; }
    label { display: block; margin: 18px 0 7px; color: #d9d8ca; font-size: .9rem; }
    input { width: 100%; box-sizing: border-box; padding: 13px 14px; border: 1px solid #69766b; border-radius: 12px; background: #151815; color: #fff; font: inherit; }
    button { margin-top: 18px; padding: 12px 16px; border: 0; border-radius: 999px; background: #d6e7c5; color: #152018; font: inherit; font-weight: 700; cursor: pointer; }
    button.secondary { margin-left: 8px; background: transparent; color: #d6e7c5; border: 1px solid #69766b; }
    button:disabled { opacity: .5; cursor: wait; }
    .hidden { display: none; }
    .status { margin-top: 20px; padding: 12px 14px; border-radius: 12px; background: #29332b; color: #dfe9d8; }
    .error { background: #482d2d; color: #ffd7ca; }
    small { color: #9fa99d; }
    .actions { display: grid; gap: 10px; margin-top: 18px; }
    .actions button { margin-top: 0; width: 100%; }
    .section-title { margin: 26px 0 8px; font-size: 1.05rem; }
    .request { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px; border-radius: 12px; background: #29332b; }
    .request button { margin: 0; }
  </style>
</head>
<body>
  <main>
    <h1>Pairing Companion</h1>
    <p>Use this browser as the second partner while Beaconnect runs on one phone.</p>

    <section id="authPanel">
      <label for="name">Partner name</label>
      <input id="name" value="Test Partner" autocomplete="name">
      <label for="email">Test partner email</label>
      <input id="email" type="email" placeholder="partner@example.com" autocomplete="email">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="At least 6 characters" autocomplete="current-password">
      <button id="signIn">Sign in</button>
      <button id="signUp" class="secondary">Create test account</button>
      <div id="authStatus" class="status hidden"></div>
    </section>

    <section id="pairPanel" class="hidden">
      <small id="signedInAs"></small>
      <label for="code">Code shown on the phone</label>
      <input id="code" inputmode="numeric" maxlength="6" placeholder="123456">
      <button id="approve">Approve pairing</button>
      <button id="generate" class="secondary">Generate a code for the phone</button>
      <button id="signOut" class="secondary">Sign out</button>
      <div id="generatedCode" class="status hidden"></div>
      <div id="pairStatus" class="status">Enter the code from the phone.</div>
    </section>

    <section id="connectedPanel" class="hidden">
      <small id="connectedAs"></small>
      <div id="connectedStatus" class="status">Connected. Use these controls to simulate your partner.</div>
      <h2 class="section-title">Partner activity</h2>
      <div class="actions">
        <button id="partnerCheckIn">Partner is Okay</button>
        <button id="requestCheckIn" class="secondary">Request phone check-in</button>
        <button id="startLive" class="secondary">Start Live Sharing</button>
        <button id="endLive" class="secondary hidden">End Live Sharing</button>
      </div>
      <div id="incomingRequest" class="request hidden">
        <span>Phone is asking if you are okay.</span>
        <button id="respondOkay">I'm Okay</button>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updateProfile } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js';
    import { getFirestore, addDoc, collection, doc, getDoc, onSnapshot, runTransaction, serverTimestamp, setDoc } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js';

    // Firebase web config is public client configuration, not a server credential.
    const firebaseConfig = {
      apiKey: 'AIzaSyBP7cW8tRtJAAFpFT7RR6ByLDIqI0Au_0w',
      authDomain: 'beaconnect-8b8c8.firebaseapp.com',
      projectId: 'beaconnect-8b8c8',
      storageBucket: 'beaconnect-8b8c8.firebasestorage.app',
      messagingSenderId: '225817273796'
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let stopPairListener = null;
    let stopRequestListener = null;
    let activePair = null;

    const $ = (id) => document.getElementById(id);
    const show = (id, visible) => $(id).classList.toggle('hidden', !visible);
    const message = (text, error = false) => {
      const element = $('pairStatus');
      element.textContent = text;
      element.classList.toggle('error', error);
    };
    const authMessage = (text, error = false) => {
      const element = $('authStatus');
      element.textContent = text;
      element.classList.toggle('error', error);
      show('authStatus', true);
    };

    async function authenticate(create) {
      const email = $('email').value.trim().toLowerCase();
      const password = $('password').value;
      const name = $('name').value.trim() || 'Test Partner';
      if (!email || password.length < 6) {
        authMessage('Enter an email and a password with at least 6 characters.', true);
        return;
      }
      try {
        const credential = create
          ? await createUserWithEmailAndPassword(auth, email, password)
          : await signInWithEmailAndPassword(auth, email, password);
        if (create) await updateProfile(credential.user, { displayName: name });
        const userRef = doc(db, 'users', credential.user.uid);
        const userSnapshot = await getDoc(userRef);
        const userData = { displayName: name };
        if (!userSnapshot.exists()) userData.createdAt = serverTimestamp();
        await setDoc(userRef, userData, { merge: true });
        openPairPanel(credential.user, name);
      } catch (error) {
        authMessage(error.message.replace('Firebase: ', ''), true);
      }
    }

    function openPairPanel(user, name) {
      show('authPanel', false);
      show('pairPanel', true);
      $('signedInAs').textContent = `Signed in as ${name} (${user.email})`;
    }

    function openConnectedPanel(pairData) {
      activePair = pairData;
      show('pairPanel', false);
      show('connectedPanel', true);
      $('connectedAs').textContent = `Partner simulator: ${auth.currentUser.displayName || 'Test Partner'}`;
      watchIncomingRequests(pairData.id);
    }

    function pairMemberId(pairData) {
      return pairData.memberIds.find((id) => id !== auth.currentUser.uid);
    }

    async function generateInviteForPhone() {
      const code = String(Math.floor(100000 + Math.random() * 900000));
      const pairRef = doc(collection(db, 'pairs'));
      const inviteRef = doc(db, 'inviteCodes', code);
      const expiresAt = new Date(Date.now() + 5 * 60 * 1000);
      try {
        await runTransaction(db, async (transaction) => {
          transaction.set(inviteRef, {
            createdBy: auth.currentUser.uid,
            pairId: pairRef.id,
            status: 'pending',
            expiresAt,
            usedBy: null,
            usedAt: null
          });
          transaction.set(pairRef, {
            memberIds: [auth.currentUser.uid],
            status: 'pending',
            createdAt: serverTimestamp(),
            approvedAt: null,
            endedAt: null,
            inviteCode: code
          });
          transaction.set(doc(db, 'users', auth.currentUser.uid), {
            activePairId: pairRef.id
          }, { merge: true });
        });
        $('generatedCode').textContent = `Phone code: ${code} (expires in 05:00)`;
        show('generatedCode', true);
        $('pairStatus').textContent = 'Enter this code on the phone, then finish confirmation there.';
        watchPair(pairRef);
      } catch (error) {
        message(error.message.replace('Firebase: ', ''), true);
      }
    }

    async function addPartnerEvent(type, detail, place = 'Home') {
      if (!activePair) return;
      await addDoc(collection(db, 'pairs', activePair.id, 'events'), {
        type,
        actorUserId: auth.currentUser.uid,
        createdAt: serverTimestamp(),
        placeLabel: place,
        detail
      });
    }

    async function partnerCheckIn() {
      try {
        await addPartnerEvent('Partner checked in', 'Your partner is around.', 'Home');
        await setDoc(doc(db, 'users', auth.currentUser.uid), {
          lastCheckInAt: serverTimestamp()
        }, { merge: true });
        $('connectedStatus').textContent = 'Partner check-in sent to the phone.';
      } catch (error) {
        $('connectedStatus').textContent = error.message.replace('Firebase: ', '');
      }
    }

    async function requestPhoneCheckIn() {
      try {
        await setDoc(doc(db, 'users', auth.currentUser.uid), {
          lastRequestCheckInAt: serverTimestamp()
        }, { merge: true });
        await addDoc(collection(db, 'pairs', activePair.id, 'checkInRequests'), {
          actorUserId: auth.currentUser.uid,
          actorDisplayName: auth.currentUser.displayName || 'Test Partner',
          targetUserId: pairMemberId(activePair),
          status: 'pending',
          response: null,
          createdAt: serverTimestamp(),
          respondedAt: null
        });
        $('connectedStatus').textContent = 'Check-in request sent to the phone.';
      } catch (error) {
        $('connectedStatus').textContent = error.message.replace('Firebase: ', '');
      }
    }

    async function startLiveSharing() {
      try {
        const startedAt = new Date();
        const expiresAt = new Date(startedAt.getTime() + 15 * 60 * 1000);
        await setDoc(doc(db, 'pairs', activePair.id, 'liveSessions', auth.currentUser.uid), {
          actorUserId: auth.currentUser.uid,
          status: 'active',
          reason: 'going home',
          startedAt: serverTimestamp(),
          expiresAt,
          pausedAt: null,
          endedAt: null,
          remainingMinutes: 15
        }, { merge: true });
        $('startLive').classList.add('hidden');
        $('endLive').classList.remove('hidden');
        $('connectedStatus').textContent = 'Live Sharing is active for 15 minutes.';
      } catch (error) {
        $('connectedStatus').textContent = error.message.replace('Firebase: ', '');
      }
    }

    async function endLiveSharing() {
      try {
        await setDoc(doc(db, 'pairs', activePair.id, 'liveSessions', auth.currentUser.uid), {
          status: 'ended',
          endedAt: serverTimestamp()
        }, { merge: true });
        $('startLive').classList.remove('hidden');
        $('endLive').classList.add('hidden');
        $('connectedStatus').textContent = 'Live Sharing ended.';
      } catch (error) {
        $('connectedStatus').textContent = error.message.replace('Firebase: ', '');
      }
    }

    function watchIncomingRequests(pairId) {
      if (stopRequestListener) stopRequestListener();
      stopRequestListener = onSnapshot(collection(db, 'pairs', pairId, 'checkInRequests'), (snapshot) => {
        const request = snapshot.docs
          .map((item) => ({ id: item.id, ...item.data() }))
          .find((item) => item.targetUserId === auth.currentUser.uid && item.status === 'pending');
        show('incomingRequest', Boolean(request));
        $('respondOkay').dataset.requestId = request?.id || '';
      });
    }

    async function respondToRequest() {
      const requestId = $('respondOkay').dataset.requestId;
      if (!requestId || !activePair) return;
      await setDoc(doc(db, 'pairs', activePair.id, 'checkInRequests', requestId), {
        status: 'responded',
        response: 'im_okay',
        respondedAt: serverTimestamp()
      }, { merge: true });
      show('incomingRequest', false);
    }

    async function approvePairing() {
      const user = auth.currentUser;
      const code = $('code').value.trim().toUpperCase();
      if (!user || !/^\d{6}$/.test(code)) {
        message('Enter the six-digit code shown on the phone.', true);
        return;
      }
      $('approve').disabled = true;
      message('Approving this connection...');
      try {
        const inviteRef = doc(db, 'inviteCodes', code);
        const invite = await getDoc(inviteRef);
        const inviteData = invite.data();
        if (!invite.exists() || !inviteData || inviteData.status !== 'pending') throw new Error('That code is no longer available.');
        const pairRef = doc(db, 'pairs', inviteData.pairId);
        const creatorRef = doc(db, 'users', inviteData.createdBy);
        await runTransaction(db, async (transaction) => {
          const pair = await transaction.get(pairRef);
          const pairData = pair.data();
          if (!pair.exists() || !pairData || pairData.memberIds.length !== 1) throw new Error('This pairing is not ready.');
          if (pairData.memberIds[0] === user.uid) throw new Error('Use a different test account for the partner.');
          transaction.update(pairRef, {
            memberIds: [inviteData.createdBy, user.uid],
            status: 'pending',
            approvedAt: serverTimestamp(),
            endedAt: null
          });
          transaction.update(inviteRef, {
            status: 'approved',
            usedBy: user.uid,
            usedAt: serverTimestamp()
          });
          transaction.update(creatorRef, { activePairId: inviteData.pairId });
          transaction.set(doc(db, 'users', user.uid), {
            displayName: user.displayName || 'Test Partner',
            activePairId: inviteData.pairId
          }, { merge: true });
        });
        message('Partner approved. Return to the phone and continue pairing.');
        watchPair(pairRef);
      } catch (error) {
        message(error.message.replace('Firebase: ', ''), true);
      } finally {
        $('approve').disabled = false;
      }
    }

    function watchPair(pairRef) {
      if (stopPairListener) stopPairListener();
      stopPairListener = onSnapshot(pairRef, (snapshot) => {
        const pairData = { id: snapshot.id, ...snapshot.data() };
        const status = pairData.status;
        if (status === 'active') message('Pairing is active. The phone can continue to Home.');
        if (status === 'active') openConnectedPanel(pairData);
      });
    }

    $('signIn').onclick = () => authenticate(false);
    $('signUp').onclick = () => authenticate(true);
    $('approve').onclick = approvePairing;
    $('generate').onclick = generateInviteForPhone;
    $('partnerCheckIn').onclick = partnerCheckIn;
    $('requestCheckIn').onclick = requestPhoneCheckIn;
    $('startLive').onclick = startLiveSharing;
    $('endLive').onclick = endLiveSharing;
    $('respondOkay').onclick = respondToRequest;
    $('signOut').onclick = async () => {
      if (stopPairListener) stopPairListener();
      if (stopRequestListener) stopRequestListener();
      await signOut(auth);
      show('pairPanel', false);
      show('connectedPanel', false);
      show('authPanel', true);
    };
    auth.onAuthStateChanged(async (user) => {
      if (!user) return;
      const userSnapshot = await getDoc(doc(db, 'users', user.uid));
      const pairId = userSnapshot.data()?.activePairId;
      if (pairId) {
        const pairSnapshot = await getDoc(doc(db, 'pairs', pairId));
        if (pairSnapshot.exists() && pairSnapshot.data()?.status === 'active') {
          openConnectedPanel({ id: pairSnapshot.id, ...pairSnapshot.data() });
          watchPair(pairSnapshot.ref);
          return;
        }
      }
      openPairPanel(user, user.displayName || 'Test Partner');
    });
  </script>
</body>
</html>
